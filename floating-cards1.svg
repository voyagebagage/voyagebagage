<svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" width="800" height="220">
  <defs>
    <clipPath id="bounds">
      <rect width="800" height="220"/>
    </clipPath>
    <style>
      .label { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; fill: #e2e8f0; }
      .sub   { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #94a3b8; }

      /* Row 1: AI agents — slow left */
      .row1 { animation: goLeft 45s linear infinite; }
      /* Row 2: Bots and apps — slow right */
      .row2 { animation: goRight 35s linear infinite; }
      /* Row 3: Frontend stack — slow left */
      .row3 { animation: goLeft 28s linear infinite; }

      @keyframes goLeft {
        0%   { transform: translateX(0px); }
        100% { transform: translateX(-820px); }
      }
      @keyframes goRight {
        0%   { transform: translateX(-820px); }
        100% { transform: translateX(0px); }
      }
    </style>
  </defs>

  <rect width="800" height="220" fill="#0d1117" rx="16"/>

  <g clip-path="url(#bounds)">

    <!-- ROW 1 — AI Agents ecosystem (y=12) -->
    <g class="row1">
      <g transform="translate(0,12)">
        <rect width="155" height="54" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="12" y="23" font-size="15">🤖</text>
        <text x="34" y="23" class="label">Claude Code</text>
        <text x="34" y="38" class="sub">Agentic coding</text>
      </g>
      <g transform="translate(175,12)">
        <rect width="155" height="54" rx="12" fill="#162030" stroke="#00D4FF" stroke-width="1"/>
        <text x="12" y="23" font-size="15">🧠</text>
        <text x="34" y="23" class="label">Claude + MCP</text>
        <text x="34" y="38" class="sub">Tool orchestration</text>
      </g>
      <g transform="translate(350,12)">
        <rect width="175" height="54" rx="12" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
        <text x="12" y="23" font-size="15">🐍</text>
        <text x="34" y="23" class="label">Agentic Workflows</text>
        <text x="34" y="38" class="sub">Python agent systems</text>
      </g>
      <g transform="translate(545,12)">
        <rect width="150" height="54" rx="12" fill="#1e1a2e" stroke="#4c1d95" stroke-width="1"/>
        <text x="12" y="23" font-size="15">⚙️</text>
        <text x="34" y="23" class="label">n8n Workflows</text>
        <text x="34" y="38" class="sub">Multi-agent pipes</text>
