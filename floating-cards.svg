        <text x="14" y="23" font-size="16">🔐</text>
        <text x="38" y="23" class="label">Clerk</text>
        <text x="38" y="38" class="sub">Zero-config auth</text>
      </g>
      <g transform="translate(1470, 98)">
        <rect width="145" height="54" rx="12" fill="#1a1e2e" stroke="#3b82f6" stroke-width="1"/>
        <text x="14" y="23" font-size="16">📱</text>
        <text x="38" y="23" class="label">React Native</text>
