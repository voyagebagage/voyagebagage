        <rect width="130" height="54" rx="12" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
        <text x="14" y="23" font-size="16">🔌</text>
        <text x="38" y="23" class="label">MCP Servers</text>
        <text x="38" y="38" class="sub">Tool orchestration</text>
