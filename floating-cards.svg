        <text x="14" y="23" font-size="16">⚙️</text>
        <text x="38" y="23" class="label">n8n Workflows</text>
        <text x="38" y="38" class="sub">Multi-agent pipes</text>
      </g>
      <g transform="translate(690, 14)">
        <rect width="140" height="54" rx="12" fill="#1a1a2e" stroke="#EE342F" stroke-width="1"/>
        <text x="14" y="23" font-size="16">🗄️</text>
        <text x="38" y="23" class="label">Convex</text>
        <text x="38" y="38" class="sub">Real-time backend</text>
