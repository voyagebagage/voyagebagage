<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg" width="800" height="180">
  <defs>
    <clipPath id="bounds">
      <rect width="800" height="180"/>
    </clipPath>
    <style>
      .label { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; fill: #e2e8f0; }
      .sub   { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #94a3b8; }

      .row1 { animation: scrollLeft 18s linear infinite; }
      .row2 { animation: scrollLeft 12s linear infinite; }

      @keyframes scrollLeft {
        0%   { transform: translateX(0px); }
        100% { transform: translateX(-820px); }
      }
    </style>
  </defs>

  <rect width="800" height="180" fill="#0d1117" rx="16"/>

  <g clip-path="url(#bounds)">

    <!-- ROW 1 slow (y=14) -->
    <g class="row1">
      <g transform="translate(0, 14)">
        <rect width="160" height="54" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="14" y="23" font-size="16">🤖</text>
        <text x="38" y="23" class="label">Claude Code</text>
        <text x="38" y="38" class="sub">Agentic coding</text>
      </g>
      <g transform="translate(190, 14)">
        <rect width="170" height="54" rx="12" fill="#0f2027" stroke="#00D4FF" stroke-width="1"/>
        <text x="14" y="23" font-size="16">🛡️</text>
        <text x="38" y="23" class="label">Self-Healing CI/CD</text>
        <text x="38" y="38" class="sub">Autonomous DevOps</text>
      </g>
      <g transform="translate(380, 14)">
        <rect width="160" height="54" rx="12" fill="#fffed29" stroke="#FFED29" stroke-width="1"/>
