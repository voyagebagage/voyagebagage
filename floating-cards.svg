        <rect width="160" height="54" rx="12" fill="#0c2a3a" stroke="#2CA5E0" stroke-width="1"/>
        <text x="14" y="23" font-size="16">💬</text>
        <text x="38" y="23" class="label">Telegram + LINE</text>
        <text x="38" y="38" class="sub">Bot architecture</text>
      </g>
